name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "carnatic/data/**"
      - "carnatic/render/**"
      - "pyproject.toml"
  workflow_dispatch:   # allow manual trigger from the Actions tab

# Required for the OIDC-based Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; don't cancel in-progress deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bani-flow
        run: pip install -e .

      - name: Render graph.html
        run: bani-render

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp carnatic/graph.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
