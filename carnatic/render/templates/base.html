<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnatic Guru-Shishya Parampara</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<style>
  /* INJECT_CSS_VARS */

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--font-ui);
    height: 100vh; display: flex; flex-direction: column;
  }

  /* ── header ── */
  header {
    padding: 10px 18px; background: var(--bg-panel);
    border-bottom: 1px solid var(--border-strong);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  header h1 {
    font-size: 1rem; color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase; font-weight: bold;
  }
  .stats  { font-size: 0.75rem; color: var(--fg-muted); }
  .controls { display: flex; gap: 8px; margin-left: auto; }

  /* ── canvas column (filter bar + graph) ── */
  #canvas-wrap {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;
  }
  #filter-bar {
    display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap;
    padding: 5px 10px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── filter groups ── */
  .filter-group {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
  }
  .filter-separator {
    width: 1px; height: 18px; background: var(--fg-dim);
    flex-shrink: 0; margin: 0 6px; opacity: 0.4;
  }

  /* ── individual chips ── */
  .filter-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 2px;
    border: 1px solid var(--border-strong); background: var(--bg-panel);
    color: var(--fg-muted); font-size: 0.68rem;
    cursor: pointer; user-select: none;
    transition: border-color 0.1s, color 0.1s, background 0.1s;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--fg-muted); color: var(--fg); }
  .filter-chip.active {
    border-color: var(--accent); color: var(--accent); background: var(--bg-input);
  }
  .filter-chip .chip-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .filter-chip .chip-dot.diamond   { transform: rotate(45deg); border-radius: 1px; }
  .filter-chip .chip-dot.rectangle { border-radius: 1px; }
  .filter-chip .chip-dot.triangle  {
    width: 0; height: 0; background: none !important;
    border-left: 4px solid transparent; border-right: 4px solid transparent;
    border-bottom: 7px solid var(--fg-muted);
  }
  .filter-chip.active .chip-dot.triangle { border-bottom-color: var(--accent); }
  .filter-chip .chip-dot.hexagon {
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }

  /* ── clear-all button ── */
  .filter-clear {
    font-size: 0.65rem; color: var(--fg-muted);
    background: none; border: none; cursor: pointer;
    padding: 2px 4px; margin-left: 4px;
  }
  .filter-clear:hover { color: var(--fg); }

  /* ── scope label ── */
  .search-scope-label {
    font-size: 0.65rem; color: var(--fg-muted);
    font-style: italic; padding: 2px 0 4px 2px; line-height: 1.3;
  }
  button {
    background: var(--bg-input); color: var(--fg-dim); border: 1px solid var(--border-strong);
    padding: 4px 10px; font-family: inherit; font-size: 0.75rem;
    cursor: pointer; border-radius: 2px;
  }
  button:hover { background: var(--bg-active); color: var(--fg); }

  /* ── main layout ── */
  #main { display: flex; flex: 1; overflow: hidden; position: relative; }
  #cy   { flex: 1; background: var(--bg-deep); min-height: 0; }

  /* ── left sidebar (global controls: Bani Flow, legends) ── */
  #left-sidebar {
    width: 260px; background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; font-size: 0.78rem;
    flex-shrink: 0;
  }

  /* ── right sidebar (node-specific: selection, recordings, edge) ── */
  #right-sidebar {
    width: 260px; background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; font-size: 0.78rem;
    flex-shrink: 0;
  }
  .panel { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel h3 {
    font-size: 0.7rem; color: var(--fg-muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
  }

  /* ── node header (collapsed single-line) ── */
  #node-info { padding: 8px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #node-header { display: flex; align-items: center; gap: 5px; }
  #node-name { font-size: 0.85rem; color: var(--accent); font-weight: bold; }
  #node-lifespan { font-size: 0.70rem; color: var(--fg-muted); margin-left: 4px; }
  .node-wiki-link {
    margin-left: auto; flex-shrink: 0;
    color: var(--accent-link); font-size: 0.72rem; text-decoration: none;
  }
  .node-wiki-link:hover { text-decoration: underline; }

  /* Single coloured shape — shape = instrument, colour = era */
  .node-shape-icon {
    width: 10px; height: 10px; display: inline-block;
    flex-shrink: 0;
    /* background-color set dynamically via JS: d.color */
  }
  .node-shape-icon.ellipse   { border-radius: 50%; }
  .node-shape-icon.diamond   { transform: rotate(45deg); border-radius: 1px; }
  .node-shape-icon.rectangle { border-radius: 1px; }
  .node-shape-icon.triangle  {
    width: 0; height: 0; background: none !important;
    border-left: 5px solid transparent; border-right: 5px solid transparent;
    border-bottom: 10px solid var(--fg-muted); /* overridden by JS for triangle */
  }
  .node-shape-icon.hexagon {
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }

  /* ── recording filter input + trail filter input ── */
  #rec-filter,
  #trail-filter {
    width: 100%; background: var(--bg-input); color: var(--fg-dim);
    border: 1px solid var(--border-strong); padding: 4px 8px;
    font-family: inherit; font-size: 0.72rem; border-radius: 2px;
    margin-top: 6px; display: none; box-sizing: border-box;
  }
  #rec-filter:focus,
  #trail-filter:focus { outline: none; border-color: var(--accent); }
  #rec-filter::placeholder,
  #trail-filter::placeholder { color: var(--fg-muted); font-style: italic; }

  /* ── unified recordings panel ── */
  #recordings-panel { display: none; }
  #recordings-list { list-style: none; margin-top: 4px; }

  /* ── concert bracket (ADR-018) ── */
  .concert-bracket {
    border-bottom: 1px solid var(--border);
    padding: 0;
  }
  .concert-bracket:last-child { border-bottom: none; }

  .concert-header {
    display: flex; align-items: flex-start; gap: 6px;
    padding: 6px 0; cursor: pointer;
  }
  .concert-header:hover .concert-title { color: var(--accent); }

  .concert-chevron {
    font-size: 0; color: var(--fg-muted);
    flex-shrink: 0; margin-top: 3px; width: 10px; text-align: center;
    user-select: none;
  }
  .concert-chevron::before { font-size: 0.60rem; content: '▶'; }
  .concert-bracket.expanded .concert-chevron::before { content: '▼'; }

  .concert-header-body { flex: 1; min-width: 0; }

  .concert-title-row {
    display: flex; align-items: baseline; gap: 4px; width: 100%;
  }
  .concert-title {
    font-size: 0.78rem; font-weight: bold; color: var(--fg-sub);
    flex: 1; min-width: 0;
  }
  .concert-date {
    font-size: 0.68rem; color: var(--fg-muted);
    flex-shrink: 0; margin-left: auto; padding-left: 6px;
  }

  .concert-performers {
    font-size: 0.68rem; color: var(--fg-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .concert-bracket.expanded .concert-performers {
    white-space: normal;
  }

  .concert-count {
    font-size: 0.65rem; color: var(--fg-muted); margin-top: 2px;
  }
  .concert-bracket.expanded .concert-count { display: none; }

  /* ── composition list inside bracket ── */
  .concert-perf-list {
    list-style: none;
    padding-left: 16px;
    margin-bottom: 4px;
  }
  .concert-perf-item {
    padding: 4px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; flex-direction: column; gap: 2px;
  }
  .concert-perf-item:last-child { border-bottom: none; }
  .concert-perf-item:hover .rec-title { color: var(--accent); }
  .concert-perf-item.playing .rec-title { color: var(--accent-sub); }

  /* ── legacy flat items ── */
  li.rec-legacy {
    padding: 5px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; flex-direction: column; gap: 2px;
    line-height: 1.4;
  }
  li.rec-legacy:last-child { border-bottom: none; }
  li.rec-legacy:hover .rec-title { color: var(--accent); }
  li.rec-legacy.playing .rec-title { color: var(--accent-sub); }

  .rec-row1 { display: flex; align-items: baseline; width: 100%; gap: 4px; }
  .rec-title {
    color: var(--accent); font-weight: bold; font-size: 0.74rem;
    flex: 1; min-width: 0; word-break: break-word;
  }
  .rec-year {
    flex-shrink: 0; color: var(--fg-muted); font-size: 0.68rem;
    margin-left: auto; padding-left: 6px;
  }
  .rec-row2 { display: flex; align-items: baseline; width: 100%; gap: 4px; }
  .rec-row3 { display: flex; align-items: baseline; width: 100%; gap: 4px; }
  .rec-meta {
    color: var(--fg-dim); font-size: 0.70rem;
    flex: 1; min-width: 0;
  }
  .rec-link {
    flex-shrink: 0; color: var(--accent-link); font-size: 0.70rem;
    text-decoration: none; white-space: nowrap;
  }
  .rec-link:hover { text-decoration: underline; }

  /* edge info */
  #edge-info    { display: none; }
  #edge-guru    { color: var(--accent); font-weight: bold; }
  #edge-arrow   { color: var(--fg-muted); font-size: 0.8rem; margin: 2px 0; }
  #edge-shishya { color: var(--accent-sub);  font-weight: bold; }
  #edge-note    { margin-top: 6px; color: var(--accent-warn); font-style: italic; font-size: 0.8rem; }
  #edge-conf    { margin-top: 4px; color: var(--fg-dim); font-size: 0.75rem; }
  #edge-src     {
    display: none; margin-top: 6px; color: var(--accent-link);
    font-size: 0.75rem; text-decoration: none;
  }
  #edge-src:hover { text-decoration: underline; }


  /* ── hover popover ── */
  #hover-popover {
    position: fixed; display: none; pointer-events: none;
    background: var(--bg-panel); border: 1px solid var(--accent); border-radius: 3px;
    padding: 7px 12px; z-index: 900; max-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #hp-name { font-size: 1rem; font-weight: bold; color: var(--accent); line-height: 1.3; }
  #hp-sub  { font-size: 0.75rem; color: var(--fg-dim); margin-top: 3px; line-height: 1.5; }

  /* ── floating media player (multi-window, class-based) ── */
  .media-player {
    position: absolute;
    width: 340px;
    background: var(--bg-panel);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.65);
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* title bar / drag handle */
  .mp-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: var(--bg-input); border-radius: 4px 4px 0 0;
    cursor: grab; border-bottom: 1px solid var(--border-strong);
  }
  .mp-bar:active { cursor: grabbing; }
  .mp-title {
    flex: 1; font-size: 0.78rem; font-weight: bold; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mp-close {
    background: none; border: none; color: var(--fg-muted);
    font-size: 1.1rem; cursor: pointer; padding: 0 2px; line-height: 1;
    flex-shrink: 0;
  }
  .mp-close:hover { color: var(--accent-danger); }

  /* 16:9 iframe wrapper */
  .mp-video-wrap {
    position: relative; width: 100%; padding-top: 56.25%; background: #000;
  }
  .mp-iframe {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; border: none;
  }

  /* resize grip at bottom */
  .mp-resize {
    height: 7px; cursor: ns-resize;
    background: var(--bg-input); border-top: 1px solid var(--border-strong);
    border-radius: 0 0 4px 4px; opacity: 0.6;
  }
  .mp-resize:hover { opacity: 1; background: var(--bg-active); }

  /* ── timeline ruler — monospace font retained for data-dense ruler ── */
  #timeline-ruler .tick-line {
    stroke: var(--border); stroke-width: 1px;
  }
  #timeline-ruler .tick-line.century {
    stroke: var(--border-strong); stroke-width: 1.5px;
  }
  #timeline-ruler .tick-label {
    fill: var(--fg-muted); font-family: var(--font-mono);
    font-size: 11px; text-anchor: middle; dominant-baseline: hanging;
  }
  #timeline-ruler .tick-label.century {
    fill: var(--fg-sub); font-size: 13px; font-weight: bold;
  }
  #timeline-ruler .era-band {
    fill: none; stroke: none;
  }
  #timeline-ruler .era-label {
    fill: var(--border-strong); font-family: var(--font-mono);
    font-size: 10px; dominant-baseline: middle;
  }
  /* ── Three-view selector (ADR-023) ── */
  .view-selector {
    display: inline-flex;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    overflow: hidden;
    margin-left: 8px;
  }
  .view-btn {
    background: var(--bg-panel);
    color: var(--fg-dim);
    border: none;
    border-right: 1px solid var(--border-strong);
    padding: 4px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .view-btn:last-child { border-right: none; }
  .view-btn:hover { background: var(--bg-input); color: var(--fg-sub); }
  .view-btn.active {
    background: var(--bg-active);
    color: var(--accent);
    font-weight: bold;
  }

  /* ── Bani Flow panel ── */
  :root { --teal: var(--accent-match); }
  #bani-flow-panel select {
    width: 100%; background: var(--bg-input); color: var(--fg-dim);
    border: 1px solid var(--border-strong); font-family: inherit; font-size: 0.74rem;
    padding: 4px 6px; border-radius: 2px; margin-bottom: 6px; cursor: pointer;
  }
  #bani-flow-panel select:focus { outline: none; border-color: var(--accent-sub); }
  #listening-trail { display: none; margin-top: 8px; }
  /* ── bani subject header (ADR-020) ── */
  #bani-subject-header {
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #bani-subject-name-row {
    display: flex; align-items: center; gap: 5px;
  }
  #bani-subject-name {
    font-size: 0.85rem; color: var(--accent); font-weight: bold;
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bani-subject-link {
    margin-left: auto; flex-shrink: 0;
    color: var(--accent-link); font-size: 0.72rem; text-decoration: none;
  }
  .bani-subject-link:hover { text-decoration: underline; }
  .bani-subject-icon {
    width: 10px; height: 10px; display: inline-block;
    flex-shrink: 0;
    background: var(--accent-sub);
    border-radius: 50%;
  }
  #bani-subject-sub {
    font-size: 0.70rem; color: var(--fg-dim);
    margin-top: 3px; line-height: 1.5;
    display: flex; flex-wrap: wrap; gap: 2px 0;
  }
  .bani-sub-link {
    color: var(--accent-link); text-decoration: none; cursor: pointer;
  }
  .bani-sub-link:hover { text-decoration: underline; }
  #bani-subject-aliases {
    font-size: 0.68rem; color: var(--fg-muted);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* ── Raga panel navigability (ADR-022) ── */
  #bani-subject-aliases-row {
    font-size: 0.68rem; color: var(--fg-muted);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #bani-janyas-row {
    margin-top: 4px;
    font-size: 0.68rem;
  }
  .bani-janyas-toggle {
    color: var(--accent-sub); cursor: pointer;
    user-select: none;
  }
  .bani-janyas-toggle:hover { text-decoration: underline; }
  .bani-janyas-count {
    color: var(--fg-muted); margin-left: 2px;
  }
  /* Janyas filter input */
  #bani-janyas-filter {
    width: 100%; box-sizing: border-box;
    margin-top: 4px;
    padding: 3px 5px;
    background: var(--bg-input); border: 1px solid var(--border-strong);
    border-radius: 2px;
    color: var(--fg); font-size: 0.68rem; font-family: inherit;
    outline: none;
  }
  #bani-janyas-filter:focus { border-color: var(--accent-sub); }
  #bani-janyas-filter::placeholder { color: var(--fg-muted); }
  /* Janyas filtered list */
  .bani-janyas-list {
    margin-top: 3px;
    padding: 2px 0;
    max-height: 130px;
    overflow-y: auto;
  }
  .bani-janya-link {
    display: block;
    padding: 2px 4px;
    color: var(--accent-link); text-decoration: none; cursor: pointer;
    font-size: 0.68rem; border-radius: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bani-janya-link:hover { background: var(--bg-input); text-decoration: underline; }
  .bani-janyas-empty {
    padding: 2px 4px; font-size: 0.68rem; color: var(--fg-muted);
  }
  #trail-list { list-style: none; }
  #trail-list li {
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 0.74rem; color: var(--fg-dim);
    display: flex; flex-direction: column; gap: 2px; line-height: 1.4;
    cursor: pointer;
  }
  #trail-list li:last-child { border-bottom: none; }
  #trail-list li:hover { color: var(--accent); }
  #trail-list li.playing { color: var(--accent-sub); }
  .trail-header { display: flex; flex-direction: column; width: 100%; gap: 1px; }
  .trail-header-primary { display: flex; align-items: center; width: 100%; gap: 4px; }
  .trail-lifespan { flex-shrink: 0; color: var(--fg-muted); font-size: 0.68rem; margin-left: auto; padding-left: 6px; }
  .trail-artist { color: var(--accent); cursor: pointer; font-weight: bold; flex-shrink: 0; display: inline-flex; align-items: center; gap: 0; }
  .trail-artist:hover { text-decoration: underline; }
  .trail-row2 { display: flex; align-items: baseline; width: 100%; gap: 4px; }
  .trail-label { color: var(--fg-dim); font-size: 0.72rem; flex: 1; min-width: 0; }
  .trail-shape-icon {
    width: 8px; height: 8px; display: inline-block;
    margin-right: 6px; vertical-align: middle; flex-shrink: 0;
  }
  .trail-shape-icon.ellipse   { border-radius: 50%; }
  .trail-shape-icon.diamond   { transform: rotate(45deg); border-radius: 1px; }
  .trail-shape-icon.rectangle { border-radius: 1px; }
  .trail-shape-icon.triangle  {
    width: 0; height: 0; background: none;
    border-left: 4px solid transparent; border-right: 4px solid transparent;
    border-bottom: 8px solid var(--fg-muted);
  }
  .trail-shape-icon.hexagon {
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }
  .trail-link {
    flex-shrink: 0; color: var(--accent-link); font-size: 0.70rem;
    text-decoration: none; white-space: nowrap; margin-left: auto;
  }
  .trail-link:hover { text-decoration: underline; }
  /* version badge — shown only when multiple recordings of the same composition
     exist for the same musician in the current trail (ADR-010) */
  .trail-version {
    flex-shrink: 0;
    font-size: 0.60rem; color: var(--bg-panel);
    background: var(--bg-active);
    border-radius: 2px;
    padding: 0px 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
    cursor: default;
  }

  /* ── co-performer display in trail (ADR-019) ── */
  .trail-artist-primary {
    font-weight: bold;
    color: var(--accent);
  }
  .trail-artist-co {
    font-weight: normal;
    font-size: 0.72rem;
    color: var(--fg-dim);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 0;
  }
  .trail-artist-co:hover { color: var(--accent); text-decoration: underline; }
  .trail-coperformer-row {
    display: flex; align-items: center; width: 100%;
  }
  .trail-context {
    font-size: 0.65rem;
    color: var(--fg-muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── panel-level search bars ── */
  .panel-search-wrap {
    padding: 8px 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .panel-search {
    width: 100% !important;
    box-sizing: border-box;
    background: var(--bg-input); color: var(--fg-dim); border: 1px solid var(--border-strong);
    padding: 4px 8px; font-family: inherit; font-size: 0.72rem;
    border-radius: 2px;
  }
  .panel-search:focus { outline: none; border-color: var(--accent); }
  .panel-search::placeholder { color: var(--fg-muted); font-style: italic; }
  .search-wrap {
    position: relative;
  }
  .search-input {
    background: var(--bg-input); color: var(--fg-dim); border: 1px solid var(--border-strong);
    padding: 4px 10px; font-family: inherit; font-size: 0.75rem;
    cursor: text; border-radius: 2px; width: 200px;
  }
  .search-input:focus {
    outline: none; border-color: var(--accent);
  }
  .search-dropdown {
    position: absolute; top: 100%; left: 0; width: 100%;
    background: var(--bg-panel); border: 1px solid var(--border-strong);
    border-radius: 0 0 3px 3px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    max-height: 280px; overflow-y: auto; z-index: 950;
  }
  .search-result-item {
    padding: 6px 10px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover,
  .search-result-item.active {
    background: var(--bg-input); color: var(--accent);
  }
  .search-result-secondary {
    font-size: 0.70rem; color: var(--fg-muted); margin-top: 2px;
  }

  /* ── ADR-025: explicit play button ── */
  .rec-play-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--border-strong);
    color: var(--accent-sub);
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 2px;
    cursor: pointer;
    line-height: 1;
  }
  .rec-play-btn:hover {
    background: var(--bg-input);
    border-color: var(--accent-sub);
    color: var(--fg);
  }

  /* ── ADR-025: raga name link in rec-meta ── */
  .rec-raga-link {
    color: var(--accent-match);
    cursor: pointer;
    text-decoration: none;
  }
  .rec-raga-link:hover { text-decoration: underline; }

  /* ── ADR-026: in-player track list ── */
  .mp-tracklist-toggle {
    background: none;
    border: none;
    color: var(--fg-muted);
    font-size: 0.85rem;
    padding: 0 4px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
  }
  .mp-tracklist-toggle:hover,
  .mp-tracklist-toggle.mp-tracklist-open {
    color: var(--accent);
  }

  .mp-tracklist {
    max-height: 180px;
    overflow-y: auto;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-strong);
  }

  .mp-track-items {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .mp-track-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 6px;
    padding: 3px 8px;
    cursor: pointer;
    font-size: 0.70rem;
    border-bottom: 1px solid var(--border);
  }
  .mp-track-item:last-child { border-bottom: none; }
  .mp-track-item:hover .mp-track-label { color: var(--accent); }

  .mp-track-label {
    color: var(--fg-dim);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .mp-track-meta {
    color: var(--fg-muted);
    flex-shrink: 0;
    font-size: 0.65rem;
  }

  .mp-track-item.mp-track-active .mp-track-label {
    color: var(--accent-sub);
  }
  .mp-track-item.mp-track-active .mp-track-meta {
    color: var(--accent-match);
  }

  /* ── ADR-027: reflective metadata inspector — monospace retained for JSON data ── */
  #meta-inspector {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 520px; max-height: 70vh;
    background: var(--bg-panel);
    border: 1px solid var(--accent);
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
    z-index: 1000;
    font-family: var(--font-mono);
  }
  #mi-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: var(--bg-input); border-radius: 4px 4px 0 0;
    border-bottom: 1px solid var(--border-strong);
    flex-shrink: 0;
  }
  #mi-title {
    flex: 1; font-size: 0.78rem; color: var(--accent);
    font-weight: bold; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  #mi-copy, #mi-close {
    background: none; border: none; color: var(--fg-muted);
    font-size: 1rem; cursor: pointer; padding: 0 3px; line-height: 1;
  }
  #mi-copy:hover { color: var(--accent-sub); }
  #mi-close:hover { color: var(--accent-danger); }
  #mi-pre {
    flex: 1; overflow-y: auto;
    padding: 12px 14px;
    font-size: 0.72rem; color: var(--fg-dim);
    line-height: 1.5; white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }
</style>
</head>
<body>

<header>
  <h1>Carnatic · Guru-Shishya Parampara</h1>
  <span class="stats">{node_count} musicians · {edge_count} lineage edges</span>
  <div class="controls">
    <button id="btn-fit" onclick="cy.fit()">Fit</button>
    <button id="btn-reset" onclick="cy.reset()">Reset</button>
    <button id="btn-relayout" onclick="relayout()">Relayout</button>
    <button id="btn-labels" onclick="toggleLabels()">Labels</button>
    <div class="view-selector" id="view-selector">
      <button class="view-btn active" id="view-btn-graph"
              onclick="switchView('graph')" title="Guru-shishya lineage graph">Graph</button>
      <button class="view-btn" id="view-btn-timeline"
              onclick="switchView('timeline')" title="Chronological timeline">Timeline</button>
      <button class="view-btn" id="view-btn-raga"
              onclick="switchView('raga')" title="Melakarta raga wheel">Ragas</button>
    </div>
  </div>
</header>

<div id="main">
  <!-- ── left sidebar: global controls (Bani Flow, legends) ── -->
  <div id="left-sidebar">
    <!-- ── Bani Flow panel ── -->
    <div class="panel" id="bani-flow-panel">
      <h3>Bani Flow &#9835;</h3>
      <div class="search-wrap panel-search-wrap" id="bani-search-wrap">
        <input id="bani-search-input" class="search-input panel-search" type="text"
               placeholder="&#9833; Search raga / composition"
               autocomplete="off" spellcheck="false">
        <div id="bani-search-dropdown" class="search-dropdown" style="display:none"></div>
        <div class="search-scope-label" id="bani-scope-label" style="display:none">
          searching all compositions
        </div>
      </div>
      <!-- Subject header — shown when a raga/composition is selected (ADR-020) -->
      <div id="bani-subject-header" style="display:none">
        <div id="bani-subject-name-row">
          <span id="bani-subject-icon" class="bani-subject-icon"></span>
          <span id="bani-subject-name"></span>
          <a id="bani-subject-link" class="bani-subject-link" href="#"
             target="_blank" style="display:none">&#8599;</a>
        </div>
        <div id="bani-subject-sub"></div>
        <!-- Row 3: aliases (ADR-022) -->
        <div id="bani-subject-aliases-row" style="display:none"></div>
        <!-- Row 4: janyas toggle + filter + list (ADR-022, mela ragas only) -->
        <div id="bani-janyas-row" style="display:none">
          <span id="bani-janyas-toggle" class="bani-janyas-toggle">&#9654; Janyas</span>
          <span id="bani-janyas-count" class="bani-janyas-count"></span>
          <div id="bani-janyas-panel" style="display:none">
            <input id="bani-janyas-filter" type="text"
                   placeholder="filter janyas&#8230;" autocomplete="off" spellcheck="false">
            <div id="bani-janyas-list" class="bani-janyas-list"></div>
          </div>
        </div>
      </div>
      <!-- Filter — BELOW the header, ABOVE the trail list (ADR-020) -->
      <input id="trail-filter" type="text" placeholder="Filter trail&#8230;"
             style="display:none" autocomplete="off" spellcheck="false" />
      <div id="listening-trail">
        <ul id="trail-list"></ul>
      </div>
    </div>

  </div>

  <!-- ── canvas column: filter bar + graph ── -->
  <div id="canvas-wrap">
    <div id="filter-bar">
      <div class="filter-group" id="era-filter-group" data-group="era"></div>
      <div class="filter-separator"></div>
      <div class="filter-group" id="instr-filter-group" data-group="instrument"></div>
      <button class="filter-clear" id="filter-clear-all"
              style="display:none" title="Clear all filters" onclick="clearAllChipFilters()">&#10005; Show all</button>
    </div>
    <div id="cy"></div>
    <svg id="timeline-ruler" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:50;"></svg>
    <!-- Raga wheel (ADR-023) -->
    <svg id="raga-wheel" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;z-index:60;background:var(--bg-deep);"></svg>
  </div>

  <!-- ── hover popover ── -->
  <div id="hover-popover">
    <div id="hp-name"></div>
    <div id="hp-sub"></div>
  </div>

  <!-- ── right sidebar: node-specific (selection, recordings, edge) ── -->
  <div id="right-sidebar">
    <div class="panel" id="musician-panel">
      <h3>Musician &#9835;</h3>
      <div class="search-wrap panel-search-wrap" id="musician-search-wrap">
        <input id="musician-search-input" class="search-input panel-search" type="text"
               placeholder="&#128269; Search musician&#8230;"
               autocomplete="off" spellcheck="false">
        <div id="musician-search-dropdown" class="search-dropdown" style="display:none"></div>
        <div class="search-scope-label" id="musician-scope-label" style="display:none">
          searching all {node_count} musicians
        </div>
      </div>
    </div>
    <div id="node-info">
      <div id="node-header">
        <span id="node-shape-icon" class="node-shape-icon ellipse"></span>
        <span id="node-name">—</span>
        <span id="node-lifespan"></span>
        <a id="node-wiki-link" class="node-wiki-link" href="#" target="_blank"
           style="display:none">&#8599;</a>
      </div>
      <input id="rec-filter" type="text" placeholder="Filter recordings&#8230;"
             style="display:none" autocomplete="off" spellcheck="false" />
    </div>

    <div class="panel" id="recordings-panel" style="display:none">
      <h3>Recordings</h3>
      <ul id="recordings-list"></ul>
    </div>

    <div class="panel" id="edge-info" style="display:none">
      <h3>Selected Edge</h3>
      <div id="edge-guru"></div>
      <div id="edge-arrow">&#8595; guru &middot; shishya</div>
      <div id="edge-shishya"></div>
      <div id="edge-note"></div>
      <div id="edge-conf"></div>
      <a id="edge-src" href="#" target="_blank">source &#8599;</a>
    </div>
  </div>
</div>
<!-- ADR-027: reflective metadata inspector overlay -->
<div id="meta-inspector" style="display:none">
  <div id="mi-bar">
    <span id="mi-title"></span>
    <button id="mi-copy" title="Copy JSON to clipboard">&#10697;</button>
    <button id="mi-close" title="Close">&#10005;</button>
  </div>
  <pre id="mi-pre"></pre>
</div>

<!-- INJECT_SCRIPTS -->
</body>
</html>
